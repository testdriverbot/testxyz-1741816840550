steps:
  - prompt: Focus the browser window.
    commands:
      - command: focus-application
        name: Google Chrome
  - prompt: Enter the website's home page URL in the address bar.
    commands:
      - command: hover-text
        text: test.xyz
        description: current URL in the address bar
        action: click
